<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clothing — WILD CLOTHING</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css">
<style>
  .header.header--fixed { position: fixed !important; transform: translateX(-50%) !important; top: 0 !important; left: 50% !important; }
  .content { padding-top: calc(var(--header-height) + var(--safe-top) + 16px); padding-left: 0; padding-right: 0; }
  .page-title { padding: 8px 16px 4px; font-size: 1.05rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-text); text-align:center; }
  .page-sub { padding: 0 16px 14px; font-size: .78rem; color: var(--color-muted); letter-spacing: .5px; text-align:center; }
  .footer-section { padding: 28px 18px calc(var(--bottom-nav-height) + 24px); border-top: 1px solid var(--color-border); margin-top: 28px; background: var(--color-bg); text-align: center; }
  .footer-section h4 { font-size: .82rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; color: var(--color-text); }
  .footer-section p { font-size: .72rem; color: var(--color-muted); line-height: 1.6; margin-bottom: 14px; }
  .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 18px; margin-bottom: 14px; }
  .footer-links a { font-size: .72rem; color: var(--color-text); text-decoration: none; letter-spacing: .5px; }
  .footer-copy { font-size: .65rem; color: var(--color-muted); letter-spacing: 1px; }
  /* Override mw-shop colors to match Rubik + light theme */
  .mw-shop { font-family: 'Rubik', system-ui, sans-serif !important; color: var(--color-text) !important; padding: 0 12px; }
  .mw-shop .mw-name { color: var(--color-text) !important; }
  .mw-shop .mw-price { color: var(--color-muted) !important; }
  .mw-card { background: #fff !important; border-color: rgba(0,0,0,0.08) !important; }
  .mw-card:hover { background: #fff !important; border-color: rgba(0,0,0,0.18) !important; box-shadow: 0 4px 24px rgba(0,0,0,0.08) !important; }
  .mw-fbtn { color: #555 !important; border-color: rgba(0,0,0,0.12) !important; }
  .mw-fbtn:hover { color: var(--color-text) !important; border-color: var(--color-text) !important; }
  .mw-pbtn { color: #555 !important; border-color: rgba(0,0,0,0.1) !important; }
  .mw-pbtn:hover { color: var(--color-text) !important; border-color: var(--color-text) !important; }
  .mw-imgwrap { background:#f5f5f5 !important; }
  .mw-empty, .mw-count { color: var(--color-muted) !important; }
  .mw-toast { bottom: calc(var(--bottom-nav-height) + 16px) !important; }
  .mw-shop .mw-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
</style>
</head>
<body>
<div class="app" data-shell="clothing" data-nav="shop">
  <main class="content">
    <h1 class="page-title">Clothing</h1>
    <p class="page-sub">Browse our full collection.</p>
<!-- ═══════════════════════════════════════════════════════════════════════
     MYWILD CLOTHING — EMBEDDABLE PRODUCT SECTION
     Paste this inside a Framer "Embed" / "Code" component
     ═══════════════════════════════════════════════════════════════════════ -->
<style>
  /* ── Scoped to .mw-shop ────────────────────────────────────────────── */
  .mw-shop * { margin:0; padding:0; box-sizing:border-box; }
  .mw-shop {
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    color:#ffffff; width:100%; max-width:1400px; margin:0 auto;
  }
  .mw-shop a { text-decoration:none; color:inherit; }
  .mw-shop img { display:block; max-width:100%; }
  .mw-shop button { cursor:pointer; font-family:inherit; }

  /* Section Title */
  .mw-title {
    text-align:center; font-size:1.5rem; font-weight:600;
    letter-spacing:5px; text-transform:uppercase; margin:0 0 8px; color:#fff;
  }
  .mw-count {
    text-align:center; font-size:.8rem; color:#a0a0a0;
    letter-spacing:1px; margin-bottom:24px;
  }

  /* Filters */
  .mw-filters {
    display:flex; justify-content:center; flex-wrap:wrap; gap:10px;
    padding:0 16px; margin-bottom:36px;
  }
  .mw-fbtn {
    padding:8px 22px; border:1px solid rgba(255,255,255,0.1); border-radius:40px;
    background:transparent; color:#a0a0a0; font-size:.75rem;
    font-weight:500; letter-spacing:1.5px; text-transform:uppercase;
    transition:all .3s ease;
  }
  .mw-fbtn:hover { border-color:#a0a0a0; color:#fff; }
  .mw-fbtn.active { background:#291409; border-color:#291409; color:#fff; }

  /* Grid */
  .mw-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:20px; padding:0 16px;
    position:relative;
    transition:opacity .35s cubic-bezier(.4,0,.2,1), transform .45s cubic-bezier(.4,0,.2,1);
  }
  .mw-grid.slide-out {
    opacity:0; transform:translateX(-40px);
    pointer-events:none;
  }
  .mw-grid.slide-in {
    opacity:0; transform:translateX(40px);
  }

  /* Card */
  .mw-card {
    background:#CCCBCA; border-radius:10px; overflow:hidden;
    border:1px solid rgba(255,255,255,0.06);
    transition:all .3s ease; position:relative;
  }
  .mw-card:hover {
    transform:translateY(-4px); border-color:rgba(255,255,255,0.12);
    box-shadow:0 4px 24px rgba(0,0,0,0.4); background:#B9ACA0;
  }
  .mw-card a { display:block; }
  .mw-imgwrap {
    position:relative; overflow:hidden; aspect-ratio:3/4; background:#CCCBCA;
  }
  .mw-imgwrap img {
    width:100%; height:100%; object-fit:cover; transition:transform .5s ease;
  }
  .mw-card:hover .mw-imgwrap img { transform:scale(1.05); }

  /* Wishlist */
  .mw-wish {
    position:absolute; top:10px; right:10px; z-index:5;
    width:32px; height:32px; border-radius:50%;
    background:rgba(0,0,0,0.4); backdrop-filter:blur(6px);
    border:none; display:flex; align-items:center; justify-content:center;
    transition:all .3s ease;
  }
  .mw-wish:hover { background:rgba(0,0,0,0.7); }
  .mw-wish svg { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2; }
  .mw-wish.active svg { fill:#e53935; stroke:#e53935; }

  /* Add to Bag overlay */
  .mw-bag-overlay {
    position:absolute; bottom:0; left:0; right:0; padding:12px;
    background:linear-gradient(transparent, rgba(0,0,0,0.8));
    opacity:0; transform:translateY(10px); transition:all .3s ease;
  }
  .mw-card:hover .mw-bag-overlay { opacity:1; transform:translateY(0); }
  .mw-bag-btn {
    width:100%; padding:9px; border:none; border-radius:4px;
    background:#291409; color:#fff; font-size:.72rem; font-weight:600;
    letter-spacing:2px; text-transform:uppercase; transition:background .3s ease;
  }
  .mw-bag-btn:hover { background:#3d1f0e; }

  /* Product Info */
  .mw-info { padding:14px; }
  .mw-name {
    font-size:.8rem; font-weight:500; letter-spacing:.3px; color:#fff;
    margin-bottom:5px; display:-webkit-box; -webkit-line-clamp:2;
    -webkit-box-orient:vertical; overflow:hidden; min-height:2.4em;
  }
  .mw-price {
    font-size:.82rem; font-weight:600; color:#a0a0a0; letter-spacing:1px;
  }

  /* Pagination */
  .mw-pages {
    display:flex; justify-content:center; align-items:center; gap:8px;
    margin-top:40px; padding:0 16px;
  }
  .mw-pbtn {
    min-width:40px; height:40px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.08); background:transparent;
    color:#a0a0a0; font-size:.85rem; font-weight:500;
    display:flex; align-items:center; justify-content:center;
    transition:all .3s ease;
  }
  .mw-pbtn:hover { border-color:#a0a0a0; color:#fff; }
  .mw-pbtn.active { background:#291409; border-color:#291409; color:#fff; }
  .mw-pbtn.disabled { opacity:.3; pointer-events:none; }

  /* No results */
  .mw-empty {
    grid-column:1/-1; text-align:center; padding:60px 20px;
    color:#a0a0a0; font-size:.9rem; letter-spacing:1px;
  }

  /* Toast */
  .mw-toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:#291409; color:#fff; padding:10px 28px; border-radius:8px;
    font-size:.8rem; font-weight:500; letter-spacing:1px; z-index:9999;
    transition:transform .4s ease; pointer-events:none;
    box-shadow:0 6px 24px rgba(41,20,9,0.4);
  }
  .mw-toast.show { transform:translateX(-50%) translateY(0); }

  /* Slide animation for cards */
  @keyframes mwSlideUp {
    from { opacity:0; transform:translateY(30px) scale(0.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  .mw-card {
    opacity:0; transform:translateY(30px) scale(0.97);
  }
  .mw-card.mw-visible {
    animation:mwSlideUp .5s cubic-bezier(.25,.46,.45,.94) forwards;
  }

  /* Filter button transition */
  .mw-fbtn {
    transition:all .35s cubic-bezier(.4,0,.2,1);
  }
  .mw-fbtn:active { transform:scale(0.95); }

  /* Page button press */
  .mw-pbtn {
    transition:all .3s cubic-bezier(.4,0,.2,1);
  }
  .mw-pbtn:active { transform:scale(0.92); }

  /* Mobile */
  @media (max-width:768px) {
    .mw-grid { grid-template-columns:repeat(2,1fr); gap:12px; padding:0 10px; }
    .mw-info { padding:10px; }
    .mw-name { font-size:.72rem; }
    .mw-price { font-size:.75rem; }
    .mw-filters { gap:6px; }
    .mw-fbtn { padding:6px 14px; font-size:.68rem; }
  }
</style>

<div class="mw-shop">

  <div class="mw-filters" id="mw-filters"></div>
  <div class="mw-grid" id="mw-grid"></div>
  <div class="mw-pages" id="mw-pages"></div>
</div>
<div class="mw-toast" id="mw-toast">Added to bag!</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// PRODUCT DATA — Edit prices here
// ═══════════════════════════════════════════════════════════════════════════
// MW_PRODUCTS now provided by assets/products.js

// ═══════════════════════════════════════════════════════════════════════════
// STATE & CONFIG
// ═══════════════════════════════════════════════════════════════════════════
let mwCat='all', mwSub=null, mwPage=1;
const PER_PAGE=40;
const SUBS={
  clothing:[{k:'all',l:'All Clothing'},{k:'jackets',l:'Jackets'},{k:'gilet',l:'Gilet'},{k:'shirts',l:'Shirts'},{k:'hoodies',l:'Hoodies'},{k:'t-shirt',l:'T-Shirts'},{k:'sweaters',l:'Sweaters'},{k:'knitted-tee-shirt',l:'Knitted Tees'},{k:'sweatshirts',l:'Sweatshirts'}],
  sunglasses:[],
  all:[{k:'all',l:'All'},{k:'clothing',l:'Clothing'},{k:'sunglasses',l:'Sunglasses'}]
};

function mwFiltered(){
  let l=MW_PRODUCTS;
  if(mwCat!=='all') l=l.filter(p=>p.cat===mwCat);
  if(mwSub&&mwSub!=='all'&&mwSub!=='clothing'&&mwSub!=='sunglasses') l=l.filter(p=>p.sub===mwSub);
  else if(mwSub==='clothing') l=l.filter(p=>p.cat==='clothing');
  else if(mwSub==='sunglasses') l=l.filter(p=>p.cat==='sunglasses');
  return l;
}

let mwAnimating=false;

function mwRender(skipAnim){
  const f=mwFiltered(), tp=Math.ceil(f.length/PER_PAGE);
  if(mwPage>tp) mwPage=tp||1;
  const s=(mwPage-1)*PER_PAGE, items=f.slice(s,s+PER_PAGE);

  // Filters
  const fc=document.getElementById('mw-filters'), subs=SUBS[mwCat]||SUBS.all;
  fc.innerHTML=subs.length?subs.map(s=>`<button class="mw-fbtn ${(mwSub===s.k)||(!mwSub&&s.k==='all')?'active':''}" onclick="mwSetSub('${s.k}')">${s.l}</button>`).join(''):'';

  // Grid — build HTML
  const g=document.getElementById('mw-grid');
  const newHTML=items.length?items.map(p=>`
    <div class="mw-card" id="mw-p${p.id}">
      <a href="${p.link}" target="_blank" rel="noopener">
        <div class="mw-imgwrap">
          <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22><rect fill=%22%23222%22 width=%22300%22 height=%22400%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23555%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>No Image</text></svg>'">
          <button class="mw-wish" data-pid="${p.id}" onclick="event.preventDefault();event.stopPropagation();mwToggleWish(${p.id},this)">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
          <div class="mw-bag-overlay">
            <button class="mw-bag-btn" onclick="event.preventDefault();event.stopPropagation();mwAddToBag(${p.id})">Add to Bag</button>
          </div>
        </div>
        <div class="mw-info">
          <h3 class="mw-name">${p.name}</h3>
          <p class="mw-price">${p.price}</p>
        </div>
      </a>
    </div>`).join(''):'<div class="mw-empty">No products found.</div>';

  // Slide transition
  if(!skipAnim && !mwAnimating){
    mwAnimating=true;
    g.classList.add('slide-out');
    setTimeout(()=>{
      g.innerHTML=newHTML;
      g.classList.remove('slide-out');
      g.classList.add('slide-in');
      void g.offsetWidth;
      g.classList.remove('slide-in');
      mwRevealCards();
      mwAnimating=false;
    },350);
  } else {
    g.innerHTML=newHTML;
    mwRevealCards();
  }

  // Pages
  const pc=document.getElementById('mw-pages');
  if(tp<=1){pc.innerHTML='';return;}
  let h=`<button class="mw-pbtn ${mwPage===1?'disabled':''}" onclick="mwGo(${mwPage-1})">‹</button>`;
  for(let i=1;i<=tp;i++) h+=`<button class="mw-pbtn ${i===mwPage?'active':''}" onclick="mwGo(${i})">${i}</button>`;
  h+=`<button class="mw-pbtn ${mwPage===tp?'disabled':''}" onclick="mwGo(${mwPage+1})">›</button>`;
  pc.innerHTML=h;
}

function mwRevealCards(){
  const cards=document.querySelectorAll('.mw-card:not(.mw-visible)');
  cards.forEach((c,i)=>{
    setTimeout(()=>c.classList.add('mw-visible'), i*50);
  });
}

function mwSetCat(c){mwCat=c;mwSub=null;mwPage=1;mwRender();}
function mwSetSub(s){
  if(s==='clothing'){mwCat='clothing';mwSub=null;}
  else if(s==='sunglasses'){mwCat='sunglasses';mwSub=null;}
  else{mwSub=s;}
  mwPage=1;mwRender();
}
function mwGo(p){const f=mwFiltered(),tp=Math.ceil(f.length/PER_PAGE);if(p<1||p>tp)return;mwPage=p;mwRender();document.getElementById('mw-filters').scrollIntoView({behavior:'smooth'});}
function mwToast(){const t=document.getElementById('mw-toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

mwRender(true);
</script>

<footer class="footer-section">
  <h4>WILD CLOTHING</h4>
  <p>Finest garments by authentic brands.<br>Wear your identity.</p>
  <div class="footer-links">
    <a href="new-arrivals.html">New Arrivals</a>
    <a href="clothing.html">Clothing</a>
    <a href="login.html">Account</a>
    <a href="index.html">Home</a>
  </div>
  <div class="footer-copy">© 2026 WILD CLOTHING</div>
</footer>
  </main>
</div>
<script src="assets/products.js"></script>
<script src="assets/store.js"></script>
<script src="assets/shell.js"></script>
<script>
  // Add a "← All categories" back button so users can return to the top-level filters
  (function(){
    const filters = document.getElementById('mw-filters');
    if (!filters) return;
    const obs = new MutationObserver(() => {
      if (typeof mwCat === 'undefined' || mwCat === 'all') return;
      if (filters.querySelector('.mw-fbtn-back')) return;
      const back = document.createElement('button');
      back.className = 'mw-fbtn mw-fbtn-back';
      back.style.cssText = 'background:transparent;border:1px dashed rgba(0,0,0,.25);color:var(--color-muted);';
      back.innerHTML = '← All';
      back.onclick = () => { mwSetCat('all'); };
      filters.insertBefore(back, filters.firstChild);
    });
    obs.observe(filters, { childList: true });
  })();
</script>
</body>
</html>
