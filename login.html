<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign In — WILD CLOTHING</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css">
<style>
  .header.header--fixed { position: fixed !important; transform: translateX(-50%) !important; top: 0 !important; left: 50% !important; }
  .content { padding-top: calc(var(--header-height) + var(--safe-top) + 24px); }
  .auth-wrap { padding: 16px 22px 28px; }
  .auth-title { font-size: 1.4rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-text); text-align: center; margin-bottom: 6px; }
  .auth-sub { font-size: .82rem; color: var(--color-muted); text-align: center; margin-bottom: 28px; }
  .auth-tabs { display: flex; border-bottom: 1px solid var(--color-border); margin-bottom: 22px; }
  .auth-tab { flex: 1; background: transparent; border: none; padding: 12px 0; font-family: inherit; font-size: .8rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .25s ease; }
  .auth-tab.active { color: var(--color-text); border-bottom-color: var(--color-text); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: .7rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--color-muted); margin-bottom: 6px; }
  .field input { width: 100%; padding: 12px 14px; border: 1px solid var(--color-border); border-radius: 8px; font-family: inherit; font-size: .9rem; color: var(--color-text); background: #fff; transition: border-color .2s ease; }
  .field input:focus { outline: none; border-color: var(--color-text); }
  .row-helper { display: flex; justify-content: space-between; align-items: center; margin: 6px 0 22px; font-size: .72rem; }
  .row-helper label { color: var(--color-muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .row-helper a { color: var(--color-text); text-decoration: none; font-weight: 600; }
  .auth-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--color-text); color: #fff; font-family: inherit; font-size: .82rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: background .25s ease; }
  .auth-btn:hover { background: #3d1f0e; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; color: var(--color-muted); font-size: .7rem; letter-spacing: 1px; text-transform: uppercase; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--color-border); }
  .social { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .social-btn { padding: 11px; border: 1px solid var(--color-border); border-radius: 8px; background: #fff; font-family: inherit; font-size: .75rem; font-weight: 600; letter-spacing: .5px; color: var(--color-text); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: border-color .2s ease; }
  .social-btn:hover { border-color: var(--color-text); }
  .social-btn svg { width: 16px; height: 16px; }
  .legal { font-size: .68rem; color: var(--color-muted); text-align: center; margin-top: 20px; line-height: 1.6; }
  .legal a { color: var(--color-text); text-decoration: none; }
  .footer-section { padding: 28px 18px calc(var(--bottom-nav-height) + 24px); border-top: 1px solid var(--color-border); margin-top: 28px; background: var(--color-bg); text-align: center; }
  .footer-section h4 { font-size: .82rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; color: var(--color-text); }
  .footer-section p { font-size: .72rem; color: var(--color-muted); line-height: 1.6; margin-bottom: 14px; }
  .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 18px; margin-bottom: 14px; }
  .footer-links a { font-size: .72rem; color: var(--color-text); text-decoration: none; letter-spacing: .5px; }
  .footer-copy { font-size: .65rem; color: var(--color-muted); letter-spacing: 1px; }
</style>
</head>
<body>
<div class="app" data-shell="" data-nav="account">
  <main class="content">
    <div class="auth-wrap">
      <h1 class="auth-title">Welcome</h1>
      <p class="auth-sub">Sign in to your WILD CLOTHING account.</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignin">Sign In</button>
        <button class="auth-tab" id="tabSignup">Create Account</button>
      </div>

      <form id="signinForm" onsubmit="event.preventDefault(); alert('Welcome back!');">
        <div class="field">
          <label for="signinEmail">Email</label>
          <input id="signinEmail" type="email" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="signinPassword">Password</label>
          <input id="signinPassword" type="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <div class="row-helper">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>
        <button type="submit" class="auth-btn">Sign In</button>
      </form>

      <form id="signupForm" style="display:none" onsubmit="event.preventDefault(); alert('Account created!');">
        <div class="field">
          <label for="signupName">Full name</label>
          <input id="signupName" type="text" autocomplete="name" placeholder="Your name" required>
        </div>
        <div class="field">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" type="email" autocomplete="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" type="password" autocomplete="new-password" placeholder="At least 8 characters" required minlength="8">
        </div>
        <button type="submit" class="auth-btn" style="margin-top:6px">Create Account</button>
      </form>

      <div class="divider">or continue with</div>

      <div class="social">
        <button class="social-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="social-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Apple
        </button>
      </div>

      <p class="legal">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
    </div>

    <footer class="footer-section">
      <h4>WILD CLOTHING</h4>
      <p>Finest garments by authentic brands.<br>Wear your identity.</p>
      <div class="footer-links">
        <a href="new-arrivals.html">New Arrivals</a>
        <a href="clothing.html">Clothing</a>
        <a href="login.html">Account</a>
        <a href="index.html">Home</a>
      </div>
      <div class="footer-copy">© 2026 WILD CLOTHING</div>
    </footer>
  </main>
</div>
<script src="assets/shell.js"></script>
<script>
  const tSi = document.getElementById('tabSignin');
  const tSu = document.getElementById('tabSignup');
  const fSi = document.getElementById('signinForm');
  const fSu = document.getElementById('signupForm');
  tSi.addEventListener('click', () => { tSi.classList.add('active'); tSu.classList.remove('active'); fSi.style.display=''; fSu.style.display='none'; });
  tSu.addEventListener('click', () => { tSu.classList.add('active'); tSi.classList.remove('active'); fSu.style.display=''; fSi.style.display='none'; });
</script>
</body>
</html>
